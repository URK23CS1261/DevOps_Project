name: Athena CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure Minikube is running
        run: |
          minikube status
          if ($LASTEXITCODE -ne 0) {
            minikube start --driver=docker
          }

      - name: Build backend image
        run: docker build -t athena-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t athena-frontend:latest ./frontend

      - name: Load images into Minikube
        run: |
          minikube image load athena-backend:latest
          minikube image load athena-frontend:latest

      - name: Deploy Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend
